<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Construction AI Estimator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0c0e14; --panel: #161a24; --panel-2: #1e2433; --border: #2a3142; --text: #eef0f6; --muted: #8b93a7; --accent: #3b82f6; --accent-hover: #2563eb; --accent-soft: rgba(59,130,246,0.15); --success: #22c55e; --warning: #f59e0b; --radius: 12px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
    nav { width: 76px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0 16px; gap: 6px; }
    .nav-logo { width: 40px; height: 40px; background: linear-gradient(135deg,#3b82f6,#8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 18px; }
    nav button { width: 48px; height: 48px; border: none; border-radius: 12px; background: transparent; color: var(--muted); cursor: pointer; font-size: 1.25rem; display: flex; align-items: center; justify-content: center; }
    nav button:hover { background: var(--panel-2); color: var(--text); }
    nav button.active { background: var(--accent-soft); color: var(--accent); }
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--panel); }
    .content { flex: 1; overflow-y: auto; padding: 28px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 16px; }
    .metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
    .metric { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 16px; text-align: center; }
    .metric .value { font-size: 1.9rem; font-weight: 700; }
    button.primary { background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
    button.primary:disabled { opacity: .45; cursor: not-allowed; }
    input[type=text], input[type=file] { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 9px; padding: 11px 14px; width: 100%; margin-bottom: 16px; }
    .chat-box { display: flex; flex-direction: column; height: calc(100vh - 130px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #0e1119; border-radius: var(--radius); margin-bottom: 14px; border: 1px solid var(--border); }
    .msg { max-width: 78%; padding: 11px 15px; border-radius: 14px; margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; }
    .msg.user { background: #1e3a5f; margin-left: auto; }
    .msg.assistant { background: var(--panel-2); }
    .chat-input { display: flex; gap: 10px; }
    .chat-input input { flex: 1; margin-bottom: 0; }
    .empty { color: var(--muted); text-align: center; padding: 60px 20px; }
    .badge { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--accent-soft); color: var(--accent); }
    .badge.warn { background: rgba(245,158,11,.15); color: var(--warning); }
  </style>
</head>
<body>
  <nav id="nav">
    <div class="nav-logo">C</div>
    <button data-view="dashboard" class="active" title="Dashboard">⌂</button>
    <button data-view="analyze" title="Analyze">⇑</button>
    <button data-view="chat" title="Chat">💬</button>
    <button data-view="trades" title="Trades">☰</button>
    <button data-view="review" title="Review">✓</button>
  </nav>
  <main>
    <header>
      <h1 id="header-title">Construction AI Estimator</h1>
      <div style="font-size:0.8rem;color:var(--muted)" id="status">Ready</div>
    </header>
    <div class="content" id="content"></div>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
